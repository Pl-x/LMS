{% extends "base.html" %}
{% block title %}Add Book{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h4><i class="fas fa-plus-circle me-2"></i>Add New Book</h4>
    <div class="sub">Add a new title to the library catalogue</div>
  </div>
  <a href="{{ url_for('books') }}" class="btn btn-outline-light btn-sm">
    <i class="fas fa-arrow-left me-1"></i>Back
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card">
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Book Title <span class="text-danger">*</span></label>
            <input type="text" name="title" class="form-control" placeholder="e.g. Introduction to Algorithms" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Author(s) <span class="text-danger">*</span></label>
            <input type="text" name="author" class="form-control" placeholder="e.g. Thomas H. Cormen" required>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">ISBN</label>
              <input type="text" name="isbn" class="form-control font-monospace" placeholder="e.g. 978-0262033848">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Genre</label>
              <input type="text" name="genre" class="form-control" placeholder="e.g. Computer Science"
                     list="genre-options">
              <datalist id="genre-options">
                <option value="Computer Science">
                <option value="Mathematics">
                <option value="Engineering">
                <option value="ODE">
                <option value="Calculus">
                <option value="Food Science">
                <option value="Business">
                <option value="History">
                <option value="Literature">
              </datalist>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Number of Copies</label>
            <input type="number" name="copies" class="form-control" value="1" min="1" max="50">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-dkut px-4">
              <i class="fas fa-save me-2"></i>Add Book
            </button>
            <a href="{{ url_for('books') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
