{% extends "base.html" %}
{% block title %}Edit Book{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h4><i class="fas fa-edit me-2"></i>Edit Book</h4>
    <div class="sub">Update book information</div>
  </div>
  <a href="{{ url_for('books') }}" class="btn btn-outline-light btn-sm">
    <i class="fas fa-arrow-left me-1"></i>Back
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card">
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Book Title <span class="text-danger">*</span></label>
            <input type="text" name="title" class="form-control" value="{{ book.title }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Author(s) <span class="text-danger">*</span></label>
            <input type="text" name="author" class="form-control" value="{{ book.author }}" required>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">ISBN</label>
              <input type="text" name="isbn" class="form-control font-monospace" value="{{ book.isbn or '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Genre</label>
              <input type="text" name="genre" class="form-control" value="{{ book.genre or '' }}">
            </div>
          </div>
          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Total Copies</label>
              <input type="number" name="copies_total" class="form-control" value="{{ book.copies_total }}" min="1">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Available Copies</label>
              <input type="number" name="copies_available" class="form-control"
                     value="{{ book.copies_available }}" min="0" max="{{ book.copies_total }}">
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-dkut px-4">
              <i class="fas fa-save me-2"></i>Save Changes
            </button>
            <a href="{{ url_for('books') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
