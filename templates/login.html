<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | DeKUT Library Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="login-logo"><i class="fas fa-university"></i></div>
      <h2 class="login-title">DeKUT Library</h2>
      <p class="login-sub">Dedan Kimathi University of Technology<br>Library Management System</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} py-2 small">
            <i class="fas fa-exclamation-circle me-1"></i>{{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold small">Username</label>
        <div class="input-group">
          <span class="input-group-text bg-light"><i class="fas fa-user text-muted"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus />
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold small">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-light"><i class="fas fa-lock text-muted"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Enter your password" required />
        </div>
      </div>
      <button type="submit" class="btn btn-dkut w-100 py-2">
        <i class="fas fa-sign-in-alt me-2"></i>Sign In
      </button>
    </form>

    <hr class="section-divider" />
    

    <div class="text-center mt-3">
      <small class="text-muted">
        <a href="https://www.dkut.ac.ke" target="_blank" class="text-decoration-none text-dkut">
          <i class="fas fa-globe me-1"></i>www.dkut.ac.ke
        </a>
      </small>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
