{% extends "base.html" %}
{% block title %}Register Student{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h4><i class="fas fa-user-plus me-2"></i>Register New Student</h4>
    <div class="sub">Add a new student member to the library</div>
  </div>
  <a href="{{ url_for('members') }}" class="btn btn-outline-light btn-sm">
    <i class="fas fa-arrow-left me-1"></i>Back
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card">
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
            <input type="text" name="full_name" class="form-control" placeholder="e.g. Jane Wanjiru Kamau" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Username <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text text-muted small">e.g. student reg no.</span>
              <input type="text" name="username" class="form-control font-monospace"
                     placeholder="e.g. S034/2020" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
            <input type="password" name="password" class="form-control"
                   placeholder="Temporary password" required>
            <div class="form-text">Student will use this to log in to the system.</div>
          </div>
          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Email</label>
              <input type="email" name="email" class="form-control" placeholder="e.g. jane@students.dkut.ac.ke">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Phone</label>
              <input type="tel" name="phone" class="form-control" placeholder="e.g. 0712345678">
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-dkut px-4">
              <i class="fas fa-user-plus me-2"></i>Register Student
            </button>
            <a href="{{ url_for('members') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
